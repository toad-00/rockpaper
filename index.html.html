<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>가위바위보 게임</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; text-align: center; transition: 0.3s; }
    .dark { background:#121212; color:#fff; }
    button { margin:10px; padding:10px 20px; font-size:16px; }
    #top-bar { position:absolute; right:10px; top:10px; }
    #score { font-size:20px; margin-top:20px; }
    #result { font-size:24px; margin:20px; }
    canvas { max-width:600px; margin:auto; }
    .confetti { position:fixed; width:10px; height:10px; background:red; animation:fall 3s linear infinite; }
    @keyframes fall { to { transform:translateY(100vh); opacity:0; } }
    table { margin:auto; border-collapse:collapse; }
    td, th { border:1px solid #ccc; padding:8px; }
  </style>
</head>
<body>

<div id="top-bar">
  <button onclick="toggleDark()">다크모드</button>
  <button onclick="toggleStats()">승률 보기</button>
</div>

<h1>가위 ✌️ 바위 ✊ 보 ✋</h1>

<div>
  <button onclick="play('가위')">가위</button>
  <button onclick="play('바위')">바위</button>
  <button onclick="play('보')">보</button>
</div>

<div id="result"></div>
<div id="score">나: 0 | 컴퓨터: 0</div>

<canvas id="chart"></canvas>

<div id="stats" style="display:none">
  <h3>승률 테이블</h3>
  <table>
    <tr><th>게임</th><th>결과</th></tr>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
let userScore = 0;
let compScore = 0;
let history = [];
let gameCount = 0;

const ctx = document.getElementById('chart').getContext('2d');
let chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{ label:'승률', data:[] }]
  }
});

function play(user) {
  if(userScore===3 || compScore===3) return;

  const choices = ['가위','바위','보'];
  const comp = choices[Math.floor(Math.random()*3)];

  let result='';
  if(user===comp) result='무승부';
  else if(
    (user==='가위'&&comp==='보')||
    (user==='바위'&&comp==='가위')||
    (user==='보'&&comp==='바위')
  ){
    result='승리'; userScore++;
  } else {
    result='패배'; compScore++;
  }

  gameCount++;
  history.push(result);

  document.getElementById('result').innerText = `너: ${user} / 컴퓨터: ${comp} → ${result}`;
  document.getElementById('score').innerText = `나: ${userScore} | 컴퓨터: ${compScore}`;

  updateTable(result);
  updateChart();

  if(userScore===3) win();
  if(compScore===3) lose();
}

function win(){
  document.getElementById('result').innerText = '🎉 축하합니다! 승리! 🎉';
  for(let i=0;i<100;i++){
    let c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=`hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(c);
  }
  setTimeout(reset,3000);
}

function lose(){
  document.getElementById('result').innerText = '😢 아쉽네요... 다시 도전해보세요!';
  setTimeout(reset,3000);
}

function reset(){
  userScore=0; compScore=0;
  document.getElementById('score').innerText='나: 0 | 컴퓨터: 0';
}

function toggleDark(){
  document.body.classList.toggle('dark');
}

function updateTable(result){
  let row = `<tr><td>${gameCount}</td><td>${result}</td></tr>`;
  document.getElementById('tableBody').innerHTML += row;
}

function toggleStats(){
  let s = document.getElementById('stats');
  s.style.display = s.style.display==='none'?'block':'none';
}

function updateChart(){
  let wins = history.filter(h=>h==='승리').length;
  let rate = (wins/history.length*100).toFixed(1);

  chart.data.labels.push(gameCount);
  chart.data.datasets[0].data.push(rate);
  chart.update();
}
</script>

</body>
</html>
